version: '3.8'

# Run the full test suite against a real Postgres database locally:
#
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner
#
# The postgres service from docker-compose.yml is reused; this file only adds
# the test-runner service and a dedicated test database.

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: inventory_db_test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_inventory
    tmpfs:
      - /var/lib/postgresql/data   # in-memory for speed; data discarded on stop
    ports:
      - "5433:5432"               # separate port to avoid collisions with dev DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_inventory"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_network

  test-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder           # assumes a multi-stage Dockerfile with a builder stage
    container_name: inventory_test_runner
    command: >
      sh -c "
        pip install pytest pytest-cov --quiet &&
        pytest tests/ -v --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=80
      "
    environment:
      TEST_DATABASE_URL: "postgresql://test:test@postgres-test:5432/test_inventory"
      DATABASE_URL: "postgresql://test:test@postgres-test:5432/test_inventory"
    depends_on:
      postgres-test:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./backend:/app           # live code mount – no rebuild needed on code change

networks:
  app_network:
    external: true
    name: inventory_network

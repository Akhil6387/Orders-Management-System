name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR so fast-pushes don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

# ============================================================================
# Jobs
# ============================================================================
jobs:

  # --------------------------------------------------------------------------
  # 1. Backend – lint
  # --------------------------------------------------------------------------
  backend-lint:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install black isort flake8

      - name: black (format check)
        run: black --check .

      - name: isort (import order)
        run: isort --check-only .

      - name: flake8 (style / errors)
        run: flake8 . --max-line-length=100 --extend-ignore=E203,W503

  # --------------------------------------------------------------------------
  # 2. Backend – unit & integration tests + coverage
  # --------------------------------------------------------------------------
  backend-test:
    name: "Backend · Tests"
    needs: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        env:
          # Use in-memory SQLite for speed; integration tests override when needed
          TEST_DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # --------------------------------------------------------------------------
  # 3. Backend – integration tests against real Postgres
  # --------------------------------------------------------------------------
  backend-integration:
    name: "Backend · Integration (Postgres)"
    needs: backend-test
    runs-on: ubuntu-latest
    # Only on pushes / merges to main|develop – skip on draft PRs
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_inventory"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run integration tests against Postgres
        env:
          TEST_DATABASE_URL: "postgresql://test:test@localhost:5432/test_inventory"
          DATABASE_URL: "postgresql://test:test@localhost:5432/test_inventory"
        run: pytest tests/test_api_integration.py -v --tb=short

  # --------------------------------------------------------------------------
  # 4. Frontend – lint, type-check, unit tests
  # --------------------------------------------------------------------------
  frontend-test:
    name: "Frontend · Lint & Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present -- --run --reporter=verbose

      - name: Build (smoke test)
        env:
          VITE_API_URL: /api
        run: npm run build

  # --------------------------------------------------------------------------
  # 5. Docker – build and push images
  # --------------------------------------------------------------------------
  docker-build:
    name: "Docker · Build & Push"
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    # Only publish images from main/develop branches, not PRs
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Backend image ----
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend image ----
      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # 6. Deploy – staging (develop branch)
  # --------------------------------------------------------------------------
  deploy-staging:
    name: "Deploy · Staging"
    needs: docker-build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/inventory-order-system
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec backend alembic upgrade head
            docker system prune -f --volumes

      - name: Smoke-test staging
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 ${{ vars.STAGING_URL }}/health

  # --------------------------------------------------------------------------
  # 7. Deploy – production (main branch, manual approval)
  # --------------------------------------------------------------------------
  deploy-production:
    name: "Deploy · Production"
    needs: [docker-build, deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/inventory-order-system
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec backend alembic upgrade head
            docker system prune -f --volumes

      - name: Smoke-test production
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 ${{ vars.PRODUCTION_URL }}/health

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *Production deploy succeeded* — `${{ github.repository }}` @ `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 *Production deploy FAILED* — `${{ github.repository }}` @ `${{ github.sha }}`\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
